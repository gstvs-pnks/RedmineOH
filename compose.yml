services:
  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_NAME: redmine_development
      DATABASE_USER: redmine
      DATABASE_PASSWORD: redmine_dev
      SECRET_KEY_BASE: local-development-secret-key
    volumes:
      - .:/app
      - redmine_files:/app/files
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: redmine_development
      MARIADB_USER: redmine
      MARIADB_PASSWORD: redmine_dev
      MARIADB_ROOT_PASSWORD: redmine_root_dev
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "healthcheck.sh",
          "--connect",
          "--innodb_initialized"
        ]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  database_data:
  redmine_files:
